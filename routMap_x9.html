<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RoutMap · Pro Optimizer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a1419;
      --bg-secondary: #0f1e24;
      --bg-card: #162b33;
      --bg-input: #1e3f49;
      --bg-hover: #1f3d47;
      --accent: #4fbf8b;
      --accent-dark: #3aa87a;
      --accent-glow: rgba(79, 191, 139, 0.25);
      --accent-glow-strong: rgba(79, 191, 139, 0.4);
      --gold: #f5b87a;
      --gold-glow: rgba(245, 184, 122, 0.3);
      --text-primary: #eaf0f5;
      --text-secondary: #b8d0d8;
      --text-muted: #7a9aa8;
      --danger: #f67b7b;
      --danger-glow: rgba(246, 123, 123, 0.2);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-lg: 24px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-hover: 0 12px 48px rgba(0, 0, 0, 0.7);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      height: 100vh;
      overflow: hidden;
      color: var(--text-primary);
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-dark); }

    .app-wrapper {
      display: flex;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: var(--bg-primary);
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 400px;
      min-width: 400px;
      background: rgba(10, 20, 25, 0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1.2rem 1.2rem 1.4rem;
      overflow-y: auto;
      border-right: 1px solid rgba(79, 191, 139, 0.08);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      z-index: 10;
      transition: var(--transition);
    }

    /* ===== BRAND HEADER ===== */
    .brand-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 0.6rem;
      border-bottom: 2px solid rgba(79, 191, 139, 0.15);
      flex-shrink: 0;
    }
    .brand-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .brand-left .logo-icon {
      background: var(--accent);
      color: var(--bg-primary);
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .brand-left .brand-name {
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), #6dd5a8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .lang-group {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
      align-items: center;
    }
    .lang-group .btn-lang {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-muted);
      padding: 0 12px;
      border-radius: 30px;
      font-size: 0.6rem;
      font-weight: 600;
      transition: var(--transition);
      cursor: pointer;
      height: 26px;
      display: flex;
      align-items: center;
      line-height: 1;
    }
    .lang-group .btn-lang:hover { 
      background: var(--accent-glow); 
      border-color: var(--accent);
      color: var(--text-primary);
    }
    .lang-group .btn-lang.active { 
      background: var(--accent); 
      border-color: var(--accent); 
      color: var(--bg-primary);
    }

    .card-glass {
      background: rgba(22, 43, 51, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
      border: 1px solid rgba(79, 191, 139, 0.06);
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    .card-glass:hover {
      border-color: rgba(79, 191, 139, 0.12);
      box-shadow: var(--shadow-hover);
    }

    .card-title {
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-left: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-secondary);
      border-left: 3px solid var(--accent);
    }
    .card-title .badge-custom {
      background: var(--accent);
      color: var(--bg-primary);
      font-size: 0.55rem;
      font-weight: 700;
      padding: 2px 14px;
      border-radius: 40px;
      text-transform: none;
      letter-spacing: 0;
    }
    .badge-custom.empty { background: rgba(184, 122, 58, 0.6); color: var(--text-primary); }

    /* Input styling */
    .input-group-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .input-group-row .form-control-sm-custom {
      flex: 1;
      min-width: 0;
      width: auto;
    }
    .input-group-row .form-control-sm-custom.name-field {
      flex: 0 0 35%;
      max-width: 35%;
    }
    .input-group-row .form-control-sm-custom.address-field {
      flex: 1;
      min-width: 0;
    }
    .input-group-row .form-control-sm-custom.phone-field {
      flex: 1;
      min-width: 0;
    }

    .form-control-sm-custom {
      background: rgba(30, 63, 73, 0.6);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.04);
      color: var(--text-primary);
      border-radius: 40px;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      transition: var(--transition);
      font-weight: 400;
      width: 100%;
      box-sizing: border-box;
    }
    .form-control-sm-custom::placeholder { color: var(--text-muted); font-weight: 300; }
    .form-control-sm-custom:focus {
      background: rgba(42, 85, 99, 0.8);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      color: var(--text-primary);
    }
    .form-control-sm-custom.error { 
      border-color: var(--danger); 
      background: rgba(61, 36, 36, 0.6);
      box-shadow: 0 0 0 3px var(--danger-glow);
    }

    .btn-accent {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border: none;
      color: var(--bg-primary);
      font-weight: 700;
      border-radius: 40px;
      padding: 0.4rem 1.2rem;
      font-size: 0.75rem;
      transition: var(--transition);
      box-shadow: 0 4px 16px rgba(79, 191, 139, 0.25);
    }
    .btn-accent:hover { 
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 6px 24px rgba(79, 191, 139, 0.35);
    }
    .btn-accent:active { transform: scale(0.97); }

    .btn-outline-accent {
      background: transparent;
      border: 1px solid rgba(79, 191, 139, 0.3);
      color: var(--accent);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      font-size: 0.7rem;
      transition: var(--transition);
      font-weight: 500;
    }
    .btn-outline-accent:hover { 
      background: var(--accent-glow); 
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--text-muted);
      border-radius: 40px;
      padding: 0.3rem 0.8rem;
      font-size: 0.65rem;
      transition: var(--transition);
      font-weight: 500;
    }
    .btn-ghost:hover { 
      background: rgba(255,255,255,0.04);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.1);
    }
    .btn-ghost.danger:hover { 
      background: var(--danger-glow);
      color: var(--danger);
      border-color: var(--danger);
    }

    .btn-group-row {
      display: flex;
      gap: 6px;
      width: 100%;
    }
    .btn-group-row .btn-accent,
    .btn-group-row .btn-outline-accent,
    .btn-group-row .btn-ghost {
      flex: 1;
      text-align: center;
      justify-content: center;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ===== DRIVER STATUS ===== */
    .driver-status {
      background: rgba(14, 35, 43, 0.6);
      backdrop-filter: blur(4px);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      border-left: 3px solid var(--accent);
      cursor: default;
      transition: var(--transition);
      width: 100%;
    }
    .driver-status:hover { 
      background: rgba(20, 50, 60, 0.7);
      transform: translateX(4px);
    }
    
    .driver-status .driver-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .driver-status .status-dot { 
      width: 9px; 
      height: 9px; 
      border-radius: 50%; 
      display: inline-block; 
      flex-shrink: 0;
      transition: var(--transition);
    }
    .driver-status .status-dot.set { 
      background: var(--accent); 
      box-shadow: 0 0 12px var(--accent-glow-strong); 
    }
    .driver-status .status-dot.not-set { 
      background: var(--gold); 
      opacity: 0.5; 
    }
    
    .driver-status .driver-name {
      font-weight: 700;
      color: #ffffff !important;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: var(--transition);
    }
    .driver-status .driver-name:hover {
      background: rgba(255,255,255,0.08);
    }
    .driver-status .driver-phone {
      font-weight: 500;
      color: #ffffff !important;
      opacity: 0.6;
      font-size: 0.65rem;
      background: rgba(255,255,255,0.06);
      padding: 0 12px;
      border-radius: 30px;
      cursor: pointer;
      transition: var(--transition);
    }
    .driver-status .driver-phone:hover {
      opacity: 1;
      background: rgba(79, 191, 139, 0.15);
    }
    .driver-status .driver-phone.empty-phone {
      opacity: 0.3;
      font-style: italic;
    }
    .driver-status .driver-address {
      font-weight: 500;
      color: #ffffff !important;
      opacity: 0.6;
      font-size: 0.6rem;
      padding: 2px 6px 2px 17px;
      cursor: pointer;
      transition: var(--transition);
      border-radius: 4px;
    }
    .driver-status .driver-address:hover {
      opacity: 1;
      background: rgba(255,255,255,0.08);
    }

    /* ===== PASSENGER LIST ===== */
    .pax-list {
      max-height: 150px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-top: 6px;
      padding-right: 2px;
    }
    .pax-item {
      background: rgba(14, 35, 43, 0.5);
      backdrop-filter: blur(4px);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid var(--gold);
      font-size: 0.75rem;
      cursor: grab;
      transition: var(--transition);
    }
    .pax-item:hover { 
      background: rgba(20, 50, 60, 0.7);
      transform: translateX(4px);
    }
    .pax-item:active { cursor: grabbing; }
    .pax-item.dragging { 
      opacity: 0.3; 
      transform: scale(0.95);
      border-color: var(--accent);
    }
    .pax-item.drag-over { 
      border-color: var(--accent); 
      background: rgba(79, 191, 139, 0.15);
      transform: scale(1.02);
    }
    
    .pax-item .pax-info {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }
    .pax-item .pax-name {
      font-weight: 700;
      color: #ffffff !important;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .pax-item .pax-name .order-badge {
      background: var(--accent);
      color: var(--bg-primary);
      font-size: 0.55rem;
      font-weight: 700;
      padding: 0 8px;
      border-radius: 30px;
    }
    .pax-item .pax-phone {
      font-weight: 500;
      color: #ffffff !important;
      opacity: 0.5;
      font-size: 0.55rem;
      background: rgba(255,255,255,0.05);
      padding: 0 10px;
      border-radius: 30px;
      cursor: pointer;
      transition: var(--transition);
    }
    .pax-item .pax-phone:hover {
      opacity: 1;
      background: rgba(79, 191, 139, 0.15);
    }
    .pax-item .pax-phone.empty-phone {
      opacity: 0.3;
      font-style: italic;
    }
    .pax-item .pax-address {
      font-weight: 500;
      color: #ffffff !important;
      opacity: 0.6;
      font-size: 0.6rem;
      cursor: pointer;
      transition: var(--transition);
      padding: 2px 4px;
      border-radius: 4px;
    }
    .pax-item .pax-address:hover {
      opacity: 1;
      background: rgba(255,255,255,0.08);
    }
    
    .pax-item .pax-actions {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }
    .pax-item .btn-icon {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 2px 6px;
      border-radius: 30px;
      font-size: 0.7rem;
      transition: var(--transition);
      cursor: pointer;
    }
    .pax-item .btn-icon:hover { 
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
    }
    .pax-item .btn-icon.edit-location { color: var(--gold); }
    .pax-item .btn-icon.edit-location:hover { 
      background: var(--gold-glow);
      color: var(--gold);
      transform: scale(1.1);
    }
    .pax-item .btn-icon.edit-location.active { 
      background: var(--gold);
      color: var(--bg-primary);
      animation: pulse-gold 1.2s infinite;
    }
    .pax-item .btn-icon.delete { color: var(--danger); }
    .pax-item .btn-icon.delete:hover { 
      background: var(--danger-glow);
      color: var(--danger);
      transform: scale(1.1);
    }

    .status-bar {
      font-size: 0.65rem;
      background: rgba(11, 31, 38, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.5rem 0.8rem;
      border-radius: 40px;
      text-align: center;
      min-height: 36px;
      border: 1px solid rgba(79, 191, 139, 0.06);
      transition: var(--transition);
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }
    .status-bar.error { 
      background: rgba(61, 26, 26, 0.6);
      color: var(--danger);
      border-color: var(--danger);
    }
    .status-bar.success { 
      background: rgba(26, 61, 42, 0.5);
      color: #7ad0a8;
      border-color: var(--accent);
    }
    .status-bar.pick-mode { 
      background: rgba(61, 58, 26, 0.5);
      color: #f5d742;
      border-color: #f5d742;
    }
    .status-bar.edit-mode { 
      background: rgba(61, 50, 26, 0.5);
      color: var(--gold);
      border-color: var(--gold);
      animation: pulse-gold 1.5s infinite;
    }

    /* ===== MAP ===== */
    .map-container {
      flex: 1;
      position: relative;
      background: var(--bg-primary);
      overflow: hidden;
    }
    #map { 
      height: 100%; 
      width: 100%; 
      background: var(--bg-primary);
    }

    .search-container {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 440px;
      max-width: calc(100% - 32px);
    }
    .search-wrapper {
      position: relative;
      width: 100%;
      background: rgba(10, 20, 25, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 60px;
      border: 1px solid rgba(79, 191, 139, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: var(--transition);
    }
    .search-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 8px 32px rgba(79, 191, 139, 0.15);
    }
    .search-wrapper input {
      width: 100%;
      padding: 12px 20px;
      padding-right: 48px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 0.85rem;
      outline: none;
      font-weight: 400;
    }
    .search-wrapper input::placeholder { color: var(--text-muted); font-weight: 300; }
    .search-wrapper .search-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
    }
    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: rgba(10, 20, 25, 0.96);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: var(--radius);
      border: 1px solid rgba(79, 191, 139, 0.1);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
      max-height: 300px;
      overflow-y: auto;
      display: none;
      z-index: 1001;
    }
    .search-results.show { display: block; }
    .search-result-item {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: var(--transition);
    }
    .search-result-item:hover { 
      background: var(--accent-glow);
    }
    .search-result-item .result-name { 
      color: var(--text-primary); 
      font-size: 0.8rem; 
      font-weight: 500;
    }
    .search-result-item .result-address { 
      color: var(--text-muted); 
      font-size: 0.65rem;
      margin-top: 2px;
    }
    .search-no-results {
      padding: 12px 16px;
      color: var(--text-muted);
      text-align: center;
      font-size: 0.75rem;
    }

    .pick-indicator {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(245, 170, 60, 0.95);
      backdrop-filter: blur(12px);
      color: var(--bg-primary);
      padding: 10px 28px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.85rem;
      z-index: 1000;
      display: none;
      box-shadow: 0 8px 40px rgba(245, 170, 60, 0.3);
      border: 1px solid rgba(255,255,255,0.15);
      animation: pulse-gold 1.5s infinite;
    }
    .pick-indicator.show { display: flex; align-items: center; gap: 12px; }

    .map-controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 999;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .map-controls .btn-map {
      background: rgba(10, 20, 25, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(79, 191, 139, 0.1);
      color: var(--text-secondary);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.65rem;
      font-weight: 500;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .map-controls .btn-map:hover { 
      background: rgba(79, 191, 139, 0.12);
      border-color: var(--accent);
      color: var(--text-primary);
      transform: translateY(-2px);
    }
    .map-controls .btn-map.active-edit { 
      background: var(--gold);
      color: var(--bg-primary);
      border-color: var(--gold);
      box-shadow: 0 0 20px var(--gold-glow);
    }

    .offline-banner {
      position: absolute;
      top: 80px;
      right: 16px;
      z-index: 999;
      background: rgba(245, 160, 60, 0.92);
      backdrop-filter: blur(12px);
      color: var(--bg-primary);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      display: none;
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .offline-banner.show { display: flex; align-items: center; gap: 6px; }

    /* ===== RIGHT PANEL ===== */
    .right-panel {
      width: 380px;
      min-width: 380px;
      background: rgba(10, 20, 25, 0.95);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(79, 191, 139, 0.06);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: var(--transition);
    }
    .panel-header {

    .panel-footer {
      padding: 0.8rem 1.2rem 1rem;

      text-align: center;
      display: block;
      letter-spacing: 0.3px;

      margin-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: var(--transition);
      cursor: pointer;

    .itinerary-item:hover { 
      background: rgba(255,255,255,0.04);
      transform: translateX(4px);
    }
    .step-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .step-number {
      background: rgba(79, 191, 139, 0.12);
      color: var(--accent);
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-number.driver-step { 
      background: rgba(245, 200, 80, 0.15);
      color: var(--gold);
    }
    .step-name { 
      font-weight: 600; 
      color: var(--text-secondary);
      cursor: pointer; 
      font-size: 0.8rem;
      transition: var(--transition);
    }
    .step-name:hover { color: var(--text-primary); }
    .step-phone {
      font-size: 0.55rem;
      opacity: 0.5;
      background: rgba(255,255,255,0.04);
      padding: 0 10px;
      border-radius: 30px;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
    }
    .step-phone:hover { 
      opacity: 1;
      background: var(--accent-glow);
      color: var(--accent);
    }
    .step-dist {
      color: rgba(79, 191, 139, 0.5);
      margin-left: auto;
      font-size: 0.65rem;
      font-weight: 600;
      background: rgba(255,255,255,0.03);
      padding: 0 10px;
      border-radius: 30px;
    }
    .step-address {
      font-size: 0.6rem;
      opacity: 0.4;
      padding-left: 30px;
      word-wrap: break-word;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      margin-top: 2px;
    }
    .step-address:hover { opacity: 0.7; }
    .itinerary-empty {
      text-align: center;
      opacity: 0.3;
      padding: 3rem 0;
      color: var(--text-muted);
    }
    .itinerary-empty i { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    /* ===== MARKERS ===== */
    .custom-marker {
      border-radius: 50%;
      text-align: center;
      font-weight: 700;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.9);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      color: #fff;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-size: 0.75rem;
      pointer-events: auto;
    }
    .custom-marker:hover { 
      transform: scale(1.2);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }
    .custom-marker-driver { 
      background: linear-gradient(135deg, #2a7a4e, #3daa78); 
      border-color: var(--gold);
      width: 36px;
      height: 36px;
      font-size: 0.95rem;
    }
    .custom-marker-pax { 
      background: linear-gradient(135deg, #d48a4a, #e8944a);
      cursor: grab;
    }
    .custom-marker-pax-ordered { 
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-color: #a5e0c0;
      cursor: grab;
    }
    .custom-marker-pax.editing { 
      background: linear-gradient(135deg, var(--gold), #f5a842);
      border-color: #fff;
      animation: pulse-gold 1s infinite;
      box-shadow: 0 0 30px rgba(245, 184, 122, 0.5);
      cursor: grabbing;
      width: 36px;
      height: 36px;
      font-size: 0.9rem;
    }
    .leaflet-marker-dragging .custom-marker-pax { 
      opacity: 0.6;
      transform: scale(1.3);
    }

    .leaflet-tile-pane { filter: brightness(0.9) contrast(1.05) saturate(0.95); }
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important;
    }
    .leaflet-control-zoom a {
      background: rgba(10, 20, 25, 0.85) !important;

      border-color: rgba(79, 191, 139, 0.08) !important;
      backdrop-filter: blur(8px) !important;
    }
    .leaflet-control-zoom a:hover { 
      background: rgba(79, 191, 139, 0.15) !important;
      color: var(--text-primary) !important;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes pulse-gold {

      50% { box-shadow: 0 0 40px rgba(245, 184, 122, 0.6); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pax-item { animation: slideIn 0.2s ease-out; }
    .itinerary-item { animation: slideIn 0.15s ease-out; }

      background: rgba(42, 85, 99, 0.9) !important;

      color: #ffffff !important;
      border-radius: 6px !important;
      padding: 2px 8px !important;
      font-size: inherit !important;
      font-family: inherit !important;
      outline: none !important;

      width: 100% !important;

      width: auto !important;

  function t(key, repl = {}) { let txt = translations[currentLang][key] || key; for (let [k,v] of Object.entries(repl)) txt = txt.replace(`{${k}}`, v); return txt; }

  // ========== HELPERS ==========
  function haversine(lat1, lon1, lat2, lon2) { const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLon=(lon2-lon1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2; return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
  function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
  function escapeHtml(s){ if(!s)return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  // ========== STATE ==========
  let map=null, driver={lat:null,lng:null,address:'',name:'',phone:''}, passengers=[], markers=[], routeLayers=[], nextId=1, currentOrder=[], pickMode=null, tempMarker=null, editingElement=null, searchMarker=null, searchTimeout=null, userLocation=null, cachedRouteData=null;
  let editMode = false;

  // ========== MAP INIT ==========
  function initMap() {
    if(map){map.invalidateSize();return;}
    const container=document.getElementById('map');

    map=L.map('map',{center:[40.7128,-74.0060],zoom:13,zoomControl:true,fadeAnimation:true,preferCanvas:true});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM',maxZoom:19,subdomains:'abcd'}).addTo(map);
    map.whenReady(()=>setTimeout(()=>map.invalidateSize(),100));

    map.on('click', handleMapClick);

  // ========== GEOLOCATION ==========
  function getUserLocation() {
    if(!navigator.geolocation){ setStatus(t('locationError'),'error'); return; }
    setStatus(t('gettingLocation'),'');
    navigator.geolocation.getCurrentPosition(
      (position)=>{
        const {latitude, longitude}=position.coords;
        userLocation={lat:latitude,lng:longitude};
        if(map){ map.setView([latitude,longitude],15); if(searchMarker)map.removeLayer(searchMarker); searchMarker=L.marker([latitude,longitude],{icon:L.divIcon({html:'📍',className:'',iconSize:[30,30]})}).addTo(map); }
        setStatus(`📍 ${t('locationSuccess')}`,'success');
      },
      (error)=>{ console.warn(error); setStatus(t('locationError'),'error'); if(map)map.setView([40.7128,-74.0060],13); },
      {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
    );
  }

  async function reverseGeocode(lat, lng) {
    try {
      const resp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18`, {
        headers: { 'User-Agent': 'RoutMap/2.0' }
      });
      const data = await resp.json();
      return data?.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    } catch { return `${lat.toFixed(5)}, ${lng.toFixed(5)}`; }
  }

  async function geocodeAddress(address) {
    try {
      const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`, {
        headers: { 'User-Agent': 'RoutMap/2.0' }
      });
      const data = await resp.json();
      if (!data || !data.length) return null;
      return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
    } catch { return null; }
  }

  // ========== SEARCH ==========
  function setupSearch() {
    const input=document.getElementById('searchInput'), results=document.getElementById('searchResults');
    if(!input)return;
    input.addEventListener('input',function(){ const q=this.value.trim(); if(q.length<2){results.classList.remove('show');return;} clearTimeout(searchTimeout); searchTimeout=setTimeout(()=>performSearch(q),400); });
    document.addEventListener('click',e=>{ if(!e.target.closest('.search-wrapper')) results.classList.remove('show'); });
  }
  async function performSearch(q) {
    const results=document.getElementById('searchResults');
    try {
      const resp=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=8&addressdetails=1`,{headers:{'User-Agent':'RoutMap/2.0'}});
      const data=await resp.json();
      if(!data||!data.length){ results.innerHTML=`<div class="search-no-results">No results for "${q}"</div>`; results.classList.add('show'); return; }
      let html='';
      data.forEach(item=>{ const name=item.display_name.split(',').slice(0,3).join(','); html+=`<div class="search-result-item" data-lat="${item.lat}" data-lng="${item.lon}" data-address="${escapeHtml(item.display_name)}"><div class="result-name">${escapeHtml(name)}</div><div class="result-address">${escapeHtml(item.display_name.substring(0,70))}</div></div>`; });
      results.innerHTML=html; results.classList.add('show');
      results.querySelectorAll('.search-result-item').forEach(el=>{ el.addEventListener('click',function(){ const lat=parseFloat(this.dataset.lat), lng=parseFloat(this.dataset.lng), addr=this.dataset.address; results.classList.remove('show'); document.getElementById('searchInput').value=addr; document.getElementById('searchInput').blur(); if(pickMode==='driver'){ document.getElementById('driverAddr').value=addr; setDriverFromCoords(lat,lng,addr); cancelPickMode(); }else if(pickMode==='passenger'){ document.getElementById('paxAddr').value=addr; const name=document.getElementById('paxName').value.trim()||'Passenger'; const phone=document.getElementById('paxPhone').value.trim()||''; addPassengerFromCoords(lat,lng,addr,name,phone); cancelPickMode(); }else{ map.setView([lat,lng],15); if(searchMarker)map.removeLayer(searchMarker); searchMarker=L.marker([lat,lng],{icon:L.divIcon({html:'📍',className:'',iconSize:[30,30]})}).addTo(map); } }); });
    }catch(e){ results.innerHTML=`<div class="search-no-results">Search error</div>`; results.classList.add('show'); }
  }

  // ========== MAP CLICK ==========

    if(!pickMode)return;

    else if(pickMode==='passenger'){ document.getElementById('paxAddr').value=addr; const name=document.getElementById('paxName').value.trim()||'Passenger'; const phone=document.getElementById('paxPhone').value.trim()||''; addPassengerFromCoords(lat,lng,addr,name,phone); cancelPickMode(); }

  function setDriverFromCoords(lat,lng,address){ const name=document.getElementById('driverName').value.trim()||'Driver'; const phone=document.getElementById('driverPhone').value.trim()||''; driver={lat,lng,address,name,phone}; if(map)map.setView([lat,lng],14); currentOrder=[]; cachedRouteData=null; updateMarkersAndMap(); clearRoutes(); resetItinerary(); updateDriverUI(); setStatus(`✅ Driver set: ${address.substring(0,40)}...`,'success'); document.getElementById('driverAddr').className=''; }

      driver.address = newAddress;
    } else {

    updateDriverUI();
    updateMarkersAndMap();
    clearRoutes();
    resetItinerary();
    updatePassengerBadge();

  // ========== EDIT SYSTEM - COMPLETELY REWORKED ==========
  let activeEdit = null;

  function cancelEdit() {
    if (activeEdit) {
      // Remove the input and restore original content
      const { element, originalContent, type, data } = activeEdit;
      if (element) {
        element.textContent = originalContent;
        element.style.display = '';
      }
      activeEdit = null;
    }
  }

  function startEditName(type, id, element) {
    if (activeEdit) cancelEdit();
    
    let currentName;
    if (type === 'driver') {
      currentName = driver.name || '';
    } else {
      const p = passengers.find(p => p.id === id);
      if (!p) return;
      currentName = p.name || '';
    }
    
    const originalContent = element.textContent;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input-field name-input';
    input.value = currentName;
    input.placeholder = 'Enter name';
    
    element.textContent = '';
    element.appendChild(input);
    input.focus();
    input.select();
    
    const save = async () => {
      const newName = input.value.trim();
      if (newName && newName !== currentName) {
        if (type === 'driver') {
          driver.name = newName;
          updateDriverUI();
        } else {
          const p = passengers.find(p => p.id === id);
          if (p) p.name = newName;
          updatePassengerUI();
        }
        updateMarkersAndMap();
        if (currentOrder.length) await optimizeAndRoute();
      }
      element.textContent = newName || (type === 'driver' ? 'Driver' : 'Passenger');
      activeEdit = null;
    };
    
    const cancel = () => {
      element.textContent = originalContent;
      activeEdit = null;
    };
    
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
    
    activeEdit = { element, originalContent, type, data: id };
  }

    if (activeEdit) cancelEdit();
    
    let currentPhone;
    if (type === 'driver') {
      currentPhone = driver.phone || '';
    } else {
      const p = passengers.find(p => p.id === id);
      if (!p) return;
      currentPhone = p.phone || '';
    }
    
    const originalContent = element.textContent;
    const input = document.createElement('input');
    input.type = 'tel';
    input.className = 'edit-input-field phone-input';
    input.value = currentPhone;

      } else {

      }
      updateMarkersAndMap();
      if (currentOrder.length) await optimizeAndRoute();
      activeEdit = null;
    };

    input.addEventListener('blur', save);

      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }

    });
    
    activeEdit = { element, originalContent, type, data: id };
  }

  function startEditAddress(type, id, element) {
    if (activeEdit) cancelEdit();
    
    let currentAddress;
    if (type === 'driver') {
      currentAddress = driver.address || '';
    } else {
      const p = passengers.find(p => p.id === id);
      if (!p) return;
      currentAddress = p.address || '';
    }
    
    const originalContent = element.textContent;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input-field';
    input.value = currentAddress;
    input.placeholder = 'Enter address';
    
    element.textContent = '';
    element.appendChild(input);
    input.focus();
    input.select();
    
    const save = async () => {
      const newAddress = input.value.trim();
      if (newAddress && newAddress !== currentAddress) {
        if (type === 'driver') {
          await editDriverAddress(newAddress);
        } else {
          await editPassengerAddress(id, newAddress);
        }
      } else {
        element.textContent = originalContent;
      }
      activeEdit = null;
    };
    
    const cancel = () => {
      element.textContent = originalContent;
      activeEdit = null;
    };
    
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
    
    activeEdit = { element, originalContent, type, data: id };
  }

  // ========== EDIT MODE ==========
  function toggleEditModeForPassenger(id) {
    const p = passengers.find(p => p.id === id);
    if (!p) return;
    if (editingPassengerId === id) {
      editingPassengerId = null;
      editMode = false;
      document.getElementById('editModeToggle').classList.remove('active-edit');
      setStatus(t('editModeOff'), 'success');
      setTimeout(() => setStatus(t('apiStatus')), 1500);
      updateMarkersAndMap();
      updatePassengerUI();
      return;
    }
    editMode = true;
    editingPassengerId = id;
    document.getElementById('editModeToggle').classList.add('active-edit');
    setStatus(`✏️ Drag marker for ${p.name} to new location`, 'edit-mode');
    updateMarkersAndMap();
    updatePassengerUI();
    document.querySelectorAll('.pax-item').forEach(item => {
      if (parseInt(item.dataset.id) === id) {
        item.style.borderColor = 'var(--gold)';
        item.style.borderWidth = '2px';
      } else {
        item.style.borderColor = '';
        item.style.borderWidth = '';
      }
    });
    if (map) map.setView([p.lat, p.lng], 15);
  }

  function toggleEditMode() {
    if (editingPassengerId !== null) {
      editingPassengerId = null;
      editMode = false;
      document.getElementById('editModeToggle').classList.remove('active-edit');
      setStatus(t('editModeOff'), 'success');
      setTimeout(() => setStatus(t('apiStatus')), 1500);
      updateMarkersAndMap();
      updatePassengerUI();
      document.querySelectorAll('.pax-item').forEach(item => {
        item.style.borderColor = '';
        item.style.borderWidth = '';
      });
      return;
    }
    editMode = !editMode;
    if (editMode) {
      document.getElementById('editModeToggle').classList.add('active-edit');
      setStatus(t('editMode'), 'edit-mode');
    } else {
      document.getElementById('editModeToggle').classList.remove('active-edit');
      setStatus(t('editModeOff'), 'success');
      setTimeout(() => setStatus(t('apiStatus')), 1500);
    }
    updateMarkersAndMap();
  }

  // ========== MARKERS WITH DRAG ==========
  function updateMarkersAndMap(){ 
    if(!map)return; 
    markers.forEach(m=>map.removeLayer(m)); 
    markers=[]; 
    if(driver.lat){ 
      const icon=L.divIcon({html:'🚗',className:'custom-marker custom-marker-driver',iconSize:[36,36],popupAnchor:[0,-18]}); 
      const m=L.marker([driver.lat,driver.lng],{icon}).addTo(map); 
      m.bindPopup(`<b>🚘 ${escapeHtml(driver.name||'Driver')}</b><br>${escapeHtml(driver.address)}${driver.phone?'<br>📞 '+escapeHtml(driver.phone):''}`); 
      markers.push(m); 
    } 
    passengers.forEach(p=>{ 
      const ordered=currentOrder.includes(p.id); 
      const num=currentOrder.indexOf(p.id); 
      const label=ordered?`${num+1}`:'🧑'; 
      const isEditing=(editingPassengerId===p.id);
      const cls=isEditing?'custom-marker-pax editing':(ordered?'custom-marker-pax-ordered':'custom-marker-pax');
      const icon=L.divIcon({html:label,className:`custom-marker ${cls}`,iconSize:[30,30],popupAnchor:[0,-15]}); 
      const markerOptions={icon};
      if(isEditing || editMode) markerOptions.draggable=true;
      const m=L.marker([p.lat,p.lng], markerOptions).addTo(map); 
      m.bindPopup(`<b>🧑 ${escapeHtml(p.name)}</b>${ordered?`<br>Stop #${num+1}`:''}${p.phone?'<br>📞 '+escapeHtml(p.phone):''}<br>📌 ${escapeHtml(p.address)}${(isEditing||editMode)?'<br><i>✏️ Drag to move</i>':''}`);
      if(isEditing || editMode){
        m.on('dragstart', function(){ this.getElement()?.classList.add('leaflet-marker-dragging'); });
        m.on('dragend', function(e){ 
          this.getElement()?.classList.remove('leaflet-marker-dragging');
          const pos=e.target.getLatLng();
          if(isEditing){
            updatePassengerLocation(editingPassengerId, pos.lat, pos.lng);
            editingPassengerId=null;
            editMode=false;
            document.getElementById('editModeToggle').classList.remove('active-edit');
            document.querySelectorAll('.pax-item').forEach(item=>{item.style.borderColor='';item.style.borderWidth='';});
            updateMarkersAndMap();
            updatePassengerUI();
          } else if(editMode){
            let closest=null, closestDist=Infinity;
            passengers.forEach(p=>{ const d=haversine(p.lat,p.lng,pos.lat,pos.lng); if(d<closestDist){closestDist=d;closest=p;} });
            if(closest && closestDist<0.5) {
              updatePassengerLocation(closest.id, pos.lat, pos.lng);
              updateMarkersAndMap();
              updatePassengerUI();
            }
          }
        });
      }
      markers.push(m); 
    }); 
    if(driver.lat&&passengers.length){ 
      const bounds=[[driver.lat,driver.lng],...passengers.map(p=>[p.lat,p.lng])]; 
      map.fitBounds(bounds,{padding:[50,50]}); 
    }else if(driver.lat){ 
      map.setView([driver.lat,driver.lng],13); 
    } 
  }

  // ========== PICK MODE ==========
  function showPickMode(mode){ pickMode=mode; const indicator=document.getElementById('pickIndicator'); const text=document.getElementById('pickModeText'); text.textContent=mode==='driver'?'📍 Tap map to set DRIVER':'📍 Tap map to add PASSENGER'; document.getElementById('pickDriverBtn')?.classList.toggle('active',mode==='driver'); document.getElementById('pickPassengerBtn')?.classList.toggle('active',mode==='passenger'); indicator.classList.add('show'); setStatus(`📍 ${mode==='driver'?'Set driver':'Add passenger'} location on map`,'pick-mode'); if(map){ if(tempMarker)map.removeLayer(tempMarker); tempMarker=L.marker(map.getCenter(),{icon:L.divIcon({html:'📍',className:'',iconSize:[30,30]})}).addTo(map); } document.getElementById('searchInput').focus(); }
  function cancelPickMode(){ pickMode=null; document.getElementById('pickIndicator').classList.remove('show'); document.getElementById('pickDriverBtn')?.classList.remove('active'); document.getElementById('pickPassengerBtn')?.classList.remove('active'); if(tempMarker&&map){map.removeLayer(tempMarker); tempMarker=null;} setStatus(t('pickModeCancelled'),'success'); setTimeout(()=>setStatus(t('apiStatus')),1500); }

  // ========== ROUTE FUNCTIONS ==========
  function clearRoutes(){ routeLayers.forEach(l=>map&&map.removeLayer(l)); routeLayers=[]; }
  function resetItinerary(){ document.getElementById('panelSteps').innerHTML=`<div class="itinerary-empty"><i class="bi bi-map"></i><span>${t('balloonEmpty')}</span></div>`; document.getElementById('panelTotalDistance').innerHTML=t('totalDistance'); document.getElementById('stopCount').textContent=`0 ${t('stops')}`; }
  async function computeOptimalOrder(){ if(!driver.lat)throw new Error('Driver not set'); if(!passengers.length)throw new Error('No passengers'); const nodes=[{...driver,type:'driver',id:'driver'},...passengers.map(p=>({...p,type:'passenger'}))]; const n=nodes.length; const dist=Array.from({length:n},()=>Array(n).fill(0)); for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){const d=haversine(nodes[i].lat,nodes[i].lng,nodes[j].lat,nodes[j].lng); dist[i][j]=d; dist[j][i]=d;} let visited=Array(n).fill(false); visited[0]=true; let order=[0], current=0, total=0, segs=[]; while(order.length<n){ let best=-1, bestD=Infinity; for(let i=0;i<n;i++){if(!visited[i]&&dist[current][i]<bestD){bestD=dist[current][i]; best=i;}} total+=bestD; segs.push(bestD); visited[best]=true; order.push(best); current=best; } return {orderedNodes:order.map(i=>nodes[i]),totalDistance:total,segmentDistances:segs}; }
  async function optimizeAndRoute(){ if(!driver.lat){setStatus('⚠️ Set driver first','error');return;} if(!passengers.length){setStatus('⚠️ Add passengers','error');return;} setStatus(t('optimizing')); try{ const {orderedNodes,totalDistance,segmentDistances}=await computeOptimalOrder(); currentOrder=orderedNodes.filter(n=>n.type==='passenger').map(n=>n.id); cachedRouteData={orderedNodes,totalDistance,segmentDistances}; drawRoute(orderedNodes,segmentDistances); updateItineraryPanel(orderedNodes,totalDistance,segmentDistances); updatePassengerUI(); updateMarkersAndMap(); updatePassengerBadge(); setStatus(t('routeOptimized'),'success'); }catch(e){ setStatus(t('optimizationFailed'),'error'); } }
  function drawRoute(nodes,segs){ clearRoutes(); if(!map)return; const colors=['#4dd0e1','#4db6ac','#66bb6a','#aed581','#ffd54f']; for(let i=0;i<nodes.length-1;i++){ const from=nodes[i], to=nodes[i+1]; const pts=[[from.lat,from.lng],[to.lat,to.lng]]; const c=colors[i%colors.length]; const line=L.polyline(pts,{color:c,weight:5,opacity:0.8,smoothFactor:1}).addTo(map); routeLayers.push(line); const glow=L.polyline(pts,{color:c,weight:14,opacity:0.1,smoothFactor:1}).addTo(map); routeLayers.push(glow); } }
  function updateItineraryPanel(nodes,total,segs){ const stepsDiv=document.getElementById('panelSteps'); if(!stepsDiv)return; let html=''; let driverPhoneHtml=nodes[0].phone?`<span class="step-phone" onclick="startEditPhone('driver', null, this)">📞 ${escapeHtml(nodes[0].phone)}</span>`:`<span class="step-phone empty-phone" onclick="startEditPhone('driver', null, this)">${t('phonePlaceholder')}</span>`; html+=`<div class="itinerary-item" data-step="0" data-type="driver"><div class="step-row"><span class="step-number driver-step">🚗</span><span class="step-name" onclick="startEditName('driver', null, this)">${t('start')}: ${escapeHtml(nodes[0].name||'Driver')}</span>${driverPhoneHtml}</div><div class="step-address" onclick="startEditAddress('driver', null, this)">${escapeHtml(nodes[0].address)}</div></div>`; for(let i=1;i<nodes.length;i++){ const p=nodes[i]; let phoneHtml=p.phone?`<span class="step-phone" onclick="startEditPhone('passenger', ${p.id}, this)">📞 ${escapeHtml(p.phone)}</span>`:`<span class="step-phone empty-phone" onclick="startEditPhone('passenger', ${p.id}, this)">${t('phonePlaceholder')}</span>`; const dist=segs[i-1]||0; html+=`<div class="itinerary-item" data-step="${i}" data-type="passenger" data-id="${p.id}"><div class="step-row"><span class="step-number">${i}</span><span class="step-name" onclick="startEditName('passenger', ${p.id}, this)">${escapeHtml(p.name)}</span>${phoneHtml}<span class="step-dist">${dist.toFixed(1)} km</span></div><div class="step-address" onclick="startEditAddress('passenger', ${p.id}, this)">${escapeHtml(p.address)}</div></div>`; } stepsDiv.innerHTML=html; document.getElementById('panelTotalDistance').innerHTML=`${t('total')} ${total.toFixed(1)} km`; document.getElementById('stopCount').textContent=`${nodes.length-1} ${t('stops')}`; }

  // ========== DEMO ==========
  async function demoPassengers(){ const baseLat=userLocation?.lat||40.7128, baseLng=userLocation?.lng||-74.0060; const list=[{name:'Alice',addr:`${baseLat+0.01}, ${baseLng+0.01}`,phone:'+1 555-123-4567'},{name:'Bob',addr:`${baseLat-0.008}, ${baseLng+0.015}`,phone:'+1 555-234-5678'},{name:'Carol',addr:`${baseLat+0.015}, ${baseLng-0.01}`,phone:'+1 555-345-6789'},{name:'Dave',addr:`${baseLat-0.012}, ${baseLng-0.008}`,phone:'+1 555-456-7890'}]; let added=0; setStatus(t('addingDemo')); for(let d of list){ try{ const result=await geocodeAddress(d.addr); if(result){ addPassengerFromCoords(result.lat,result.lng,d.addr,d.name,d.phone); added++; } }catch(e){console.warn('demo skip',d.addr);} } if(added)setStatus(t('demoAdded',{count:added}),'success'); else setStatus('⚠️ Demo failed, check addresses','error'); }

  // ========== EXPORT / PRINT / CLEAR / FIT ==========
  function exportRoute(){ if(!currentOrder.length){setStatus('⚠️ No route to export!','error');return;} const nodes=getOrderedNodesForPanel(); if(!nodes)return; let summary='=== ROUTEMAP - EXPORT ===\nDate: '+new Date().toLocaleString()+'\nTotal Distance: '+document.getElementById('panelTotalDistance').textContent+'\n\nSTOPS:\n'; nodes.forEach((node,i)=>{ const label=i===0?'🚗 START':`📍 STOP ${i}`; summary+=`${label}: ${node.name||'Unnamed'}\n  Address: ${node.address}\n`; if(node.phone)summary+=`  Phone: ${node.phone}\n`; summary+='\n'; }); const blob=new Blob([summary],{type:'text/plain'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`routemap-export-${Date.now()}.txt`; a.click(); URL.revokeObjectURL(url); setStatus('✅ Route exported!','success'); }
  function printRoute(){ if(!currentOrder.length){setStatus('⚠️ No route to print!','error');return;} window.print(); }
  function clearRoute(){ if(!currentOrder.length&&!passengers.length)return; if(!confirm('Clear the current route and all passengers?'))return; passengers=[]; currentOrder=[]; cachedRouteData=null; clearRoutes(); resetItinerary(); updatePassengerUI(); updateMarkersAndMap(); updatePassengerBadge(); setStatus('🗑️ Route cleared',''); }
  function fitMap(){ if(driver.lat&&passengers.length){ const bounds=[[driver.lat,driver.lng],...passengers.map(p=>[p.lat,p.lng])]; map.fitBounds(bounds,{padding:[50,50]}); }else if(driver.lat){ map.setView([driver.lat,driver.lng],14); }else{ setStatus('⚠️ No markers to fit','error'); } }
  function getOrderedNodesForPanel(){ if(!driver.lat||!currentOrder.length)return null; const nodes=[{...driver,type:'driver',id:'driver'}]; for(let id of currentOrder){const p=passengers.find(p=>p.id===id); if(p)nodes.push({...p,type:'passenger'});} return nodes; }

  // ========== SAVE / LOAD ==========
  function saveState() {
    try {
      const state = { driver, passengers, currentOrder, nextId, cachedRouteData, timestamp: Date.now() };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setStatus(t('stateSaved'), 'success');
      setTimeout(() => setStatus(t('apiStatus')), 1500);
    } catch (e) { setStatus('⚠️ Save failed', 'error'); }
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) { setStatus(t('noState'), ''); return; }
      const state = JSON.parse(raw);
      if (!state.driver || !state.passengers) { setStatus('⚠️ Invalid state', 'error'); return; }
      driver = state.driver;
      if (driver.lat) {
        document.getElementById('driverName').value = driver.name || '';
        document.getElementById('driverAddr').value = driver.address || '';
        document.getElementById('driverPhone').value = driver.phone || '';
      }
      passengers = state.passengers || [];
      nextId = state.nextId || 1;
      currentOrder = state.currentOrder || [];
      cachedRouteData = state.cachedRouteData || null;
      updateDriverUI();
      updatePassengerUI();
      updateMarkersAndMap();
      updatePassengerBadge();
      if (cachedRouteData && cachedRouteData.orderedNodes) {
        const { orderedNodes, totalDistance, segmentDistances } = cachedRouteData;
        drawRoute(orderedNodes, segmentDistances);
        updateItineraryPanel(orderedNodes, totalDistance, segmentDistances);
        setStatus(t('stateRestored'), 'success');
      } else {
        clearRoutes();
        resetItinerary();
        setStatus(t('stateRestored'), 'success');
      }
      setTimeout(() => setStatus(t('apiStatus')), 1500);
    } catch (e) { setStatus('⚠️ Load failed', 'error'); }
  }

  // ========== DOWNLOADS ==========
  async function downloadPNG(){ try{ setStatus(t('generatingPNG')); if(map){map.invalidateSize(); await sleep(300);} const container=document.getElementById('mapContainer'); const canvas=await html2canvas(container,{scale:2.5,useCORS:true,backgroundColor:'#0a1419',logging:false,width:container.scrollWidth,height:container.scrollHeight}); const rightPanel=document.getElementById('rightPanel'); const panelCanvas=await html2canvas(rightPanel,{scale:2.5,useCORS:true,backgroundColor:'#0a1419',logging:false}); const combined=document.createElement('canvas'); const totalWidth=canvas.width+panelCanvas.width; const totalHeight=Math.max(canvas.height,panelCanvas.height); combined.width=totalWidth; combined.height=totalHeight; const ctx=combined.getContext('2d'); ctx.fillStyle='#0a1419'; ctx.fillRect(0,0,totalWidth,totalHeight); ctx.drawImage(canvas,0,0); ctx.drawImage(panelCanvas,canvas.width,0); const link=document.createElement('a'); link.download='routemap.png'; link.href=combined.toDataURL('image/png'); link.click(); setStatus(t('pngDownloaded'),'success'); setTimeout(()=>setStatus(t('apiStatus')),2500); }catch(e){console.error(e); setStatus('❌ Download failed','error');} }
  async function downloadPDF(){ try{ setStatus(t('generatingPDF')); if(map){map.invalidateSize(); await sleep(300);} const container=document.getElementById('mapContainer'); const canvas=await html2canvas(container,{scale:2.5,useCORS:true,backgroundColor:'#0a1419',logging:false,width:container.scrollWidth,height:container.scrollHeight}); const rightPanel=document.getElementById('rightPanel'); const panelCanvas=await html2canvas(rightPanel,{scale:2.5,useCORS:true,backgroundColor:'#0a1419',logging:false}); const combined=document.createElement('canvas'); const totalWidth=canvas.width+panelCanvas.width; const totalHeight=Math.max(canvas.height,panelCanvas.height); combined.width=totalWidth; combined.height=totalHeight; const ctx=combined.getContext('2d'); ctx.fillStyle='#0a1419'; ctx.fillRect(0,0,totalWidth,totalHeight); ctx.drawImage(canvas,0,0); ctx.drawImage(panelCanvas,canvas.width,0); const imgData=combined.toDataURL('image/png'); const {jsPDF}=window.jspdf; const pdf=new jsPDF('landscape','mm','a4'); const imgW=297; const imgH=(combined.height*imgW)/combined.width; pdf.addImage(imgData,'PNG',0,0,imgW,imgH); pdf.save('routemap.pdf'); setStatus(t('pdfDownloaded'),'success'); setTimeout(()=>setStatus(t('apiStatus')),2500); }catch(e){console.error(e); setStatus('❌ PDF failed','error');} }

  // ========== DRAG & DROP ==========
  function initDragDrop(){ let dragged=null; document.addEventListener('dragstart',e=>{ const item=e.target.closest('.pax-item'); if(!item)return; dragged=item; item.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',item.dataset.id); }); document.addEventListener('dragend',e=>{document.querySelectorAll('.pax-item').forEach(el=>el.classList.remove('dragging','drag-over'));}); document.addEventListener('dragover',e=>{e.preventDefault(); const target=e.target.closest('.pax-item'); if(target&&target!==dragged)target.classList.add('drag-over');}); document.addEventListener('dragleave',e=>{const target=e.target.closest('.pax-item'); if(target)target.classList.remove('drag-over');}); document.addEventListener('drop',e=>{ e.preventDefault(); const target=e.target.closest('.pax-item'); if(!target||!dragged||target===dragged)return; target.classList.remove('drag-over'); const fromId=parseInt(dragged.dataset.id); const toId=parseInt(target.dataset.id); const fi=passengers.findIndex(p=>p.id===fromId); const ti=passengers.findIndex(p=>p.id===toId); if(fi===-1||ti===-1)return; const [rem]=passengers.splice(fi,1); passengers.splice(ti,0,rem); currentOrder=[]; cachedRouteData=null; updatePassengerUI(); updateMarkersAndMap(); clearRoutes(); resetItinerary(); setStatus(t('orderUpdated'),'success'); }); }

  // ========== LANGUAGE ==========
  function updateLang(lang){ currentLang=lang; document.querySelectorAll('.lang-group .btn-lang').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang)); document.getElementById('apiStatus').textContent=t('apiStatus'); document.getElementById('searchInput').placeholder=t('searchPlaceholder'); document.querySelector('#clearRouteBtn').textContent='🗑️ '+t('clearRoute'); document.querySelector('#exportRouteBtn').innerHTML='<i class="bi bi-download"></i> '+t('exportRoute'); document.querySelector('#printRouteBtn').innerHTML='<i class="bi bi-printer"></i> '+t('printRoute'); document.querySelector('#zoomFitBtn').innerHTML='<i class="bi bi-arrows-expand"></i> '+t('fitMap'); document.querySelector('#editModeToggle').innerHTML='<i class="bi bi-pencil"></i> '+t('editModeOff').replace('✅ ',''); document.querySelector('.panel-header h5 span:first-child').innerHTML='<i class="bi bi-list-ul me-1"></i> '+t('optimalRoute'); updateDriverUI(); updatePassengerUI(); if(cachedRouteData){const {orderedNodes,totalDistance,segmentDistances}=cachedRouteData; updateItineraryPanel(orderedNodes,totalDistance,segmentDistances); updatePassengerBadge();}else{resetItinerary();} }

  // ========== EVENTS ==========
  function bindEvents(){
    document.getElementById('setDriverBtn').addEventListener('click',setDriver);
    document.getElementById('pickDriverBtn').addEventListener('click',()=>pickMode==='driver'?cancelPickMode():showPickMode('driver'));
    document.getElementById('removeDriverBtn').addEventListener('click',removeDriver);
    document.getElementById('addPassengerBtn').addEventListener('click',addPassengerFromUI);
    document.getElementById('pickPassengerBtn').addEventListener('click',()=>pickMode==='passenger'?cancelPickMode():showPickMode('passenger'));
    document.getElementById('demoBtn').addEventListener('click',demoPassengers);
    document.getElementById('clearBtn').addEventListener('click',clearAllPassengers);
    document.getElementById('optimizeBtn').addEventListener('click',optimizeAndRoute);
    document.getElementById('downloadMapBtn').addEventListener('click',downloadPNG);
    document.getElementById('printMapBtn').addEventListener('click',downloadPDF);
    document.getElementById('cancelPickBtn').addEventListener('click',cancelPickMode);
    document.getElementById('zoomFitBtn').addEventListener('click',fitMap);
    document.getElementById('clearRouteBtn').addEventListener('click',clearRoute);
    document.getElementById('exportRouteBtn').addEventListener('click',exportRoute);
    document.getElementById('printRouteBtn').addEventListener('click',printRoute);
    document.getElementById('saveStateBtn').addEventListener('click',saveState);
    document.getElementById('loadStateBtn').addEventListener('click',loadState);
    document.getElementById('editModeToggle').addEventListener('click',toggleEditMode);
    document.getElementById('driverAddr').addEventListener('keypress',e=>{if(e.key==='Enter')setDriver();});
    document.getElementById('driverPhone').addEventListener('keypress',e=>{if(e.key==='Enter')setDriver();});
    document.getElementById('paxAddr').addEventListener('keypress',e=>{if(e.key==='Enter')addPassengerFromUI();});
    document.getElementById('paxName').addEventListener('keypress',e=>{if(e.key==='Enter')addPassengerFromUI();});
    document.getElementById('paxPhone').addEventListener('keypress',e=>{if(e.key==='Enter')addPassengerFromUI();});
    document.querySelectorAll('.lang-group .btn-lang').forEach(b=>b.addEventListener('click',()=>updateLang(b.dataset.lang)));
    
    // Driver click events
    document.getElementById('driverStatusName').addEventListener('click',function(e){e.stopPropagation(); if(driver.lat)startEditName('driver', null, this);});
    document.getElementById('driverStatusAddr').addEventListener('click',function(e){e.stopPropagation(); if(driver.lat)startEditAddress('driver', null, this);});
    document.getElementById('driverStatusPhone').addEventListener('click',function(e){e.stopPropagation(); if(driver.lat)startEditPhone('driver', null, this);});
    
    // Click outside to cancel edit
    document.addEventListener('click', function(e) {
      if (activeEdit && !activeEdit.element?.contains(e.target)) {
        // Only cancel if clicking outside the edit field
        const isClickOnEdit = e.target.closest('.edit-input-field');
        if (!isClickOnEdit) {
          // Trigger blur to save
          const input = activeEdit.element?.querySelector('.edit-input-field');
          if (input) input.blur();
        }
      }
    });
  }

  // ========== INIT ==========
  function init(){ initMap(); bindEvents(); initDragDrop(); updateDriverUI(); updatePassengerBadge(); updateLang('en'); }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init); else init();
  window.addEventListener('resize',()=>{if(map)setTimeout(()=>map.invalidateSize(),150);});
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&map)setTimeout(()=>map.invalidateSize(),200);});
</script>
